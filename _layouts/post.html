---
layout: default
author_profile: true
---

<style>
  .post-body {
    font-size: 1.1em;
    line-height: 1.8;
  }
  .post-body p, .post-body li {
    font-size: inherit;
  }
  .post-header h1 {
    font-size: 1.6em;
    margin-bottom: 0.25em;
  }
  .post-header .page__meta {
    font-size: 0.95em;
    color: #666;
    margin-bottom: 1.5em;
  }
</style>

<div class="post-header">
  <h1>{{ page.title }}</h1>
  <p class="page__meta">{{ page.date | date: "%Y-%m-%d" }}{% if page.location %} · {{ page.location }}{% endif %}</p>
</div>

<div class="post-body">
{{ content }}
</div>
